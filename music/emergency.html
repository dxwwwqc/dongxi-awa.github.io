    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        #wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 顶部信息区域 */
        .top {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        
        #title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        #timer, #duration {
            font-size: 16px;
            color: #aaa;
        }
        
        .subtitle {
            font-size: 16px;
            color: #aaa;
        }
        
        /* 背景区域 */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #16213e;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .plyr__video-embed {
            width: 100%;
            height: 100%;
        }
        
        .plyr__video-embed iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* 进度条 */
        #waveform {
            position: absolute;
            bottom: 120px;
            left: 0;
            width: 100%;
            height: 100px;
            z-index: 5;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
        }
        
        #progress {
            position: absolute;
            bottom: 120px;
            left: 0;
            height: 4px;
            width: 0%;
            background-color: #bf6dff;
            z-index: 6;
        }
        
        /* 控制区 */
        .controlsOuter {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        .controlsInner {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .btn {
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            transition: color 0.3s;
        }
        
        .btn:hover {
            color: #bf6dff;
        }
        
        #playBtn, #pauseBtn {
            font-size: 36px;
        }
        
        #loading {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 设置面板 */
        #setting {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 20;
            display: none;
            min-width: 300px;
        }
        
        .settingText {
            color: #fff;
            margin-bottom: 10px;
        }
        
        .settingTitle {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .settingOption {
            float: right;
        }
        
        .select {
            background: #333;
            color: #fff;
            border: none;
            padding: 5px;
            border-radius: 5px;
        }
        
        /* 播放列表 */
        #playlist {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            overflow-y: auto;
            z-index: 15;
            display: none;
            padding: 20px;
        }
        
        #closePlaylist {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: #fff;
        }
        
        .playlist-title {
            font-weight: bold;
            font-size: 18px;
            margin: 15px 0 10px;
            color: #bf6dff;
        }
        
        .playlist-item {
            padding: 8px 0;
            cursor: pointer;
            color: #fff;
        }
        
        .playlist-item:hover {
            color: #bf6dff;
        }
        
        /* 音量控制 */
        #volume {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            z-index: 10;
            display: none;
        }
        
        .bar {
            position: absolute;
            height: 100%;
            border-radius: 15px;
        }
        
        #barEmpty {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
        }
        
        #barFull {
            width: 50%;
            background: #bf6dff;
        }
        
        #sliderBtn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;

        /* 动画效果 */
        .fadein {
            animation: fadeIn 0.5s;
        }
        
        .fadeout {
            animation: fadeOut 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        .fadein-2s {
            animation: fadeIn 2s;
        }
    </style>

    <script>
        // 将player.js的内容内联到这里
        // Cache references to DOM elements.
        var elms = ['track', 'timer', 'duration', 'playBtn', 'pauseBtn', 'prevBtn', 'nextBtn', 'settingBtn', 'playlistBtn', 'volumeBtn', 'progress', 'waveform', 'canvas', 'loading', 'playlist', 'list', 'volume', 'barEmpty', 'barFull', 'sliderBtn'];
        elms.forEach(function (elm) {
          window[elm] = document.getElementById(elm);
        });

        // For Japanese title cache
        let jpGameTitles = [];
        let jpSongTitles = [];

        /**
         * Player class containing the state of our playlist and where we are in it.
         * Includes all methods for playing, skipping, updating the display, etc.
         * @param {Array} playlist Array of objects with playlist song details ({title, file, howl}).
         */
        var Player = function (playlist) {
          this.playlist = playlist;

          // URL Parser
          var url = new URL(window.location.href);
          var parser = new URLSearchParams(url.search);
          var parserIndex = parseInt(parser.get('index'));
          if (!isNaN(parserIndex) && parserIndex < playlist.length && parserIndex > 0) {
            this.index = parserIndex;
          } else {
            do {
              this.index = Math.floor(Math.random() * playlist.length);
            } while (playlist[this.index].file == null);
          }

          // Display the song title of the first track.
          track.innerHTML = playlist[this.index].title;

          var indexTemp = this.index - 1;
          while (this.playlist[indexTemp].file != null) {
            --indexTemp;
          }
          document.getElementById('series').innerHTML = this.playlist[indexTemp].title;
          changeImage(playlist[this.index].info);

          var ul = null;
          var ulth = 1;
          var pl = document.getElementById('playlist')
          // Setup the playlist display.
          playlist.forEach(function (song) {
            var li = document.createElement('li');
            li.className = 'pure-menu-item';
            if (song.file == null) {
              // Title
              if (ul != null) {
                pl.appendChild(ul);
              }
              li.innerHTML = song.title;
              jpGameTitles.push(song.title);
              li.id = song.code;
              li.className += ' pure-menu-disabled playlist-title';
              ul = document.createElement('ul');
              ul.className = 'pure-menu-list';
              if (ulth > 5) {
                ul.style.backgroundImage = 'url(\'' + MUSIC_BASE_URL + 'images/title/' + ('00' + ulth).slice(-2) + '.jpg\')';
              }
              ulth++;
            } else {
              // Song
              var a = document.createElement('div');
              a.innerHTML = song.title;
              jpSongTitles.push(song.title);
              a.className = 'pure-menu-link playlist-item';
              a.id = `${song.file}`
              a.onclick = function () {
                player.skipTo(playlist.indexOf(song));
              };
              li.appendChild(a);
            }
            ul.appendChild(li);
          });
          pl.appendChild(ul);
          gapi.client.setApiKey(googleAPI);
          gapi.client.load('youtube', 'v3');
          // For mobile user, display non-animated waveform as default
          if (mobilecheck()) {
            animatedWaveform.checked = '';
          }
        };

        Player.prototype = {

          lang: 'jp',
          /**
           * Play a song in the playlist.
           * @param  {Number} index Index of the song in the playlist (leave empty to play the first or current).
           */
          play: function (index, isNewSong) {
            var self = this;
            var sound;

            index = typeof index === 'number' ? index : self.index;
            // Unload last song
            if (self.playlist[self.index].howl && self.index != index) {
              self.playlist[self.index].howl.unload();
              delete self.playlist[self.index].howl;
            }
            // Keep track of the index we are currently playing.
            self.index = index;

            // Skip song not exist
            var data = self.playlist[index];
            if (data.file == null) {
              self.skip('next');
              return;
            }

            // URL Parser
            var url = new URL(window.location.href);
            var parser = new URLSearchParams(url.search);
            parser.set('index', index);
            history.pushState(null, '', '?' + parser.toString());

            // Load song    
            if (data.howl) {
              sound = data.howl;
            } else {
              // 使用新的音乐文件路径
              var musicUrl = data.file.startsWith('http') ? data.file : MUSIC_BASE_URL + data.file;
              
              sound = data.howl = new Howl({
                src: [musicUrl],
                html5: true,
                onplay: function () {
                  // For chorus mode
                  if (chorusMode.checked && self.playlist[self.index].chorusStartTime) {
                    data.howl.seek(self.playlist[self.index].chorusStartTime - 1);
                    data.howl.fade(0.0, 1.0, 1000);
                  }

                  // Display the duration.
                  duration.innerHTML = self.formatTime(Math.round(sound.duration()));

                  // Start upating the progress of the track.
                  requestAnimationFrame(self.step.bind(self));

                  pauseBtn.style.display = 'block';
                },
                onload: function () {
                  loading.style.display = 'none';
                },
                onend: function () {
                  self.skip('next');
                },
                onpause: function () {},
                onstop: function () {}
              });

              // Waveform display
              var width = waveform.clientWidth;
              var height = (window.innerHeight > 0) ? window.innerHeight * 0.2 : screen.height * 0.2;
              waveform.style.bottom = (height * 0.1 + 90) + 'px';
              if (animatedWaveform.checked) {
                var accuracy = (width < 400) ? 16 : (width < 550) ? 32 : (width < 950) ? 64 : 128;
                canvas.style.display = 'block';
                waveform.style.opacity = 0.5;
                if (wavesurfer) {
                  wavesurfer.destroy();
                }
                // 由于vudio.js缺失，这里使用简化版本
                console.log("Vudio visualization would be enabled here");
              } else {
                canvas.style.display = 'none';
                waveform.style.opacity = 1;
                if (wavesurfer) {
                  wavesurfer.destroy();
                }
                wavesurfer = WaveSurfer.create({
                  container: '#waveform',
                  backend: 'MediaElement',
                  barWidth: 3,
                  cursorColor: '#b556ff',
                  cursorWidth: 1,
                  progressColor: '#bf6dff',
                  waveColor: '#e0e0e0',
                  responsive: true
                });
                wavesurfer.load(sound._sounds[0]._node)
                wavesurfer.on('ready', function () {
                  wavesurfer.play();
                });
              }
              waveform.style.cursor = 'pointer';
              var indexTemp = index - 1;
              while (self.playlist[indexTemp].file != null) {
                --indexTemp;
              }
              document.getElementById('series').innerHTML = self.playlist[indexTemp].title;
            }

            // Begin playing the sound.
            sound.play();

            // Update the track display with new song title
            this.updateTitle(index)

            // Play video
            if (videoPlayer.stopped || isNewSong) {
              mvInfo = data.info;
              mvStage = 0;
            } else if (videoPlayer.paused) {
              videoPlayer.play();
            }

            // Show the pause button.
            if (sound.state() === 'loaded') {
              playBtn.style.display = 'none';
              pauseBtn.style.display = 'block';
            } else {
              loading.style.display = 'block';
              playBtn.style.display = 'none';
              pauseBtn.style.display = 'none';
            }
          },

          /**
           * Pause the currently playing track.
           */
          pause: function () {
            var self = this;

            // Get the Howl we want to manipulate.
            var sound = self.playlist[self.index].howl;

            // Puase the sound.
            sound.pause();

            if (videoPlayer.playing) {
              videoPlayer.pause();
            }

            // Show the play button.
            playBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
          },

          /**
           * Skip to the next or previous track.
           * @param  {String} direction 'next' or 'prev'.
           */
          skip: function (direction) {
            var self = this;

            // Get the next track based on the direction of the track.
            var index = 0;
            if (direction === 'prev' && self.playlist[self.index].howl && self.playlist[self.index].howl.seek() <= 3) {
              self.playlist[self.index].howl.seek(0);
            } else {
              if (randomPlay.checked) {
                index = Math.floor(Math.random() * self.playlist.length);
              } else {
                if (direction === 'prev') {
                  index = self.index - 1;
                  if (index < 0) {
                    index = self.playlist.length - 1;
                  }
                } else {
                  index = self.index + 1;
                  if (index >= self.playlist.length) {
                    index = 0;
                  }
                }
              }
              self.skipTo(index);
            }
          },

          /**
           * Skip to a specific track based on its playlist index.
           * @param  {Number} index Index in the playlist.
           */
          skipTo: function (index) {
            var self = this;

            // Stop the current track.
            if (self.playlist[self.index].howl) {
              self.playlist[self.index].howl.stop();
            }

            // Reset progress.
            progress.style.width = '0%';
            progressNow = 0;

            // Play the new track.
            self.play(index, true);
          },

          /**
           * Set the volume and update the volume slider display.
           * @param  {Number} val Volume between 0 and 1.
           */
          volume: function (val) {
            var self = this;

            // Update the global volume (affecting all Howls).
            Howler.volume(val);

            // Update the display on the slider.
            var barWidth = (val * 90) / 100;
            barFull.style.width = (barWidth * 100) + '%';
            sliderBtn.style.left = (window.innerWidth * barWidth + window.innerWidth * 0.05 - 25) + 'px';
          },

          /**
           * Seek to a new position in the currently playing track.
           * @param  {Number} per Percentage through the song to skip.
           */
          seek: function (per) {
            var self = this;

            // Get the Howl we want to manipulate.
            var sound = self.playlist[self.index].howl;

            // Convert the percent into a seek position.
            sound.seek(sound.duration() * per);
          },

          /**
           * The step called within requestAnimationFrame to update the playback position.
           */
          step: function () {
            var self = this;

            // Get the Howl we want to manipulate.
            var sound = self.playlist[self.index].howl;

            // Determine our current seek position.
            var seek = sound.seek() || 0;
            timer.innerHTML = self.formatTime(Math.round(seek));
            progressNow = (seek / sound.duration());
            progress.style.width = ((progressNow * 100) || 0) + '%';

            // For chorus mode
            if (!chorusFlag && chorusMode.checked &&
              self.playlist[self.index].chorusEndTime &&
              seek >= self.playlist[self.index].chorusEndTime) {
              chorusFlag = true;
              sound.fade(1.0, 0.0, 2000);
              setTimeout(function () {
                self.skip('next');
                chorusFlag = false;
              }, 2000);
            } else {
              // If the sound is still playing, continue stepping.
              requestAnimationFrame(self.step.bind(self));
            }
          },

          /**
           * Toggle the playlist display on/off.
           */
          togglePlaylist: function () {
            var self = this;
            var display = (playlist.style.display === 'block') ? 'none' : 'block';

            setTimeout(function () {
              playlist.style.display = display;
            }, (display === 'block') ? 0 : 500);
            playlist.className = (display === 'block') ? 'pure-menu pure-menu-scrollable fadein' : 'pure-menu pure-menu-scrollable fadeout';
          },

          /**
           * Toggle the volume display on/off.
           */
          toggleVolume: function () {
            var self = this;
            var display = (volume.style.display === 'block') ? 'none' : 'block';

            setTimeout(function () {
              volume.style.display = display;
            }, (display === 'block') ? 0 : 500);
            volume.className = (display === 'block') ? 'fadein' : 'fadeout';
          },

          /**
           * Toggle the setting display on/off.
           */
          toggleSetting: function () {
            var self = this;
            var display = (setting.style.display === 'block') ? 'none' : 'block';

            setTimeout(function () {
              setting.style.display = display;
            }, (display === 'block') ? 0 : 500);
            setting.className = (display === 'block') ? 'pure-menu fadein' : 'pure-menu fadeout';
          },

          /**
           * Format the time from seconds to M:SS.
           * @param  {Number} secs Seconds to format.
           * @return {String}      Formatted time.
           */
          formatTime: function (secs) {
            var minutes = Math.floor(secs / 60) || 0;
            var seconds = (secs - minutes * 60) || 0;

            return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
          },
