<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="https://dxwwwqc.github.io/music-assets/images/favicon/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="东方Project 随机音乐">
    <meta property="og:image" content="https://dxwwwqc.github.io/music-assets/images/favicon/android-chrome-256x256.png" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="东方Project 随机音乐">
    <meta name="msvalidate.01" content="3BDCFECA73036E90C8F629F8CC7075D7" />
    <title>东方随机音乐</title>
    <link rel="apple-touch-icon" sizes="180x180" href="https://dxwwwqc.github.io/music-assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://dxwwwqc.github.io/music-assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://dxwwwqc.github.io/music-assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="https://dxwwwqc.github.io/music-assets/images/favicon/site.webmanifest">
    <link rel="mask-icon" href="https://dxwwwqc.github.io/music-assets/images/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="https://dxwwwqc.github.io/music-assets/images/favicon/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/purecss@1.0.0/build/pure-min.css" integrity="sha384-nn4HPE8lTHyVtfCBi5yW9d20FjT8BJwUXyWZT9InLYax14RDjBj46LmSztkmNP9w"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.4.3/plyr.css" integrity="sha256-rufXFXaVZSvt3zXMGOG17EoglendvXvURMiR5lX9O8g="
        crossorigin="anonymous" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        #wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        
        .top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
        }
        
        #title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #track {
            font-size: 18px;
            font-weight: bold;
        }
        
        #timer, #duration {
            font-size: 14px;
            color: #ccc;
        }
        
        .subtitle {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .plyr__video-embed {
            width: 100%;
            height: 100%;
        }
        
        .plyr__video-embed iframe {
            width: 100%;
            height: 100%;
        }
        
        #waveform {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            z-index: 5;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
        }
        
        #progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: rgba(255, 255, 255, 0.2);
            z-index: 6;
        }
        
        .controlsOuter {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .controlsInner {
            display: flex;
            align-items: center;
        }
        
        .btn {
            font-size: 24px;
            color: #fff;
            cursor: pointer;
            margin: 0 10px;
        }
        
        #loading {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #setting {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: #222;
            z-index: 20;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
        }
        
        #setting.active {
            right: 0;
        }
        
        .settingTitle {
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0 10px;
            color: #fff;
        }
        
        .settingText {
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }
        
        .settingOption {
            margin-bottom: 15px;
        }
        
        .select {
            width: 100%;
            padding: 5px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
        }
        
        #playlist {
            position: absolute;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: #222;
            z-index: 20;
            transition: left 0.3s;
            padding: 20px;
            overflow-y: auto;
        }
        
        #playlist.active {
            left: 0;
        }
        
        #closePlaylist {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #fff;
            cursor: pointer;
        }
        
        #volume {
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 30px;
            height: 150px;
            background: #333;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
        }
        
        .bar {
            width: 6px;
        }
        
        #barFull {
            background: #fff;
            flex: 1;
            margin-bottom: 5px;
        }
        
        #barEmpty {
            background: #555;
            flex: 1;
            margin-top: 5px;
        }
        
        #sliderBtn {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            left: 5px;
        }
        
        .fadein {
            display: block;
            opacity: 1;
            transition: opacity 0.5s;
        }
        
        .fadeout {
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body id="body">
    <div id="wrapper">
        <!-- 顶部信息 -->
        <div class="top">
            <div id="title">
                <span id="track">东方随机音乐</span>
                <div id="timer">0:00</div>
                <div id="duration">0:00</div>
            </div>
            <div class="subtitle">
                <span id="series">正在加载...</span>
                <p id="pid"></p>
            </div>
        </div>
        
        <!-- 背景区域 -->
        <div id="background">
            <!-- 视频 -->
            <div class="plyr__video-embed fadein-2s" id="videoPlayer">
                <iframe src=""></iframe>
            </div>
        </div>

        
        <!-- 进度条 -->
        <div id="waveform">
            <canvas id="canvas"></canvas>
        </div>
        <div id="progress"></div>

        <!-- 控制区 -->
        <div class="controlsOuter">
            <div class="controlsInner">
                <div id="loading"></div>
                <i class="btn fas fa-play" id="playBtn"></i>
                <i class="btn fas fa-pause" id="pauseBtn"></i>
                <i class="btn fas fa-step-backward" id="prevBtn"></i>
                <i class="btn fas fa-step-forward" id="nextBtn"></i>
            </div>
           
            <div class="btn" id="playlistBtn">
                <i class="fas fa-list"></i>
            </div>
            <i class="btn fas fa-cog" id="settingBtn"></i>
            <div class="btn" id="volumeBtn">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="pure-menu" id="setting">
            <ul class="pure-menu-list">
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">MV生成设置</div>
                </li>
                <li class="pure-menu-item">
                    <label class="settingText" for="numOfImages">图片数量</label>
                    <select class="settingOption select" id="numOfImages">
                        <option>2</option>
                        <option>3</option>
                        <option selected>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </li>
                <li class="pure-menu-item">
                    <label class="settingText" for="imagesDuration">图片显示时长(秒)</label>
                    <select class="settingOption select" id="imagesDuration">
                        <option>3</option>
                        <option>4</option>
                        <option selected>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">音频设置</div>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText">随机播放</div>
                    <label class="settingOption">
                        <input type="checkbox" id="randomPlay">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText" title="使波形图动起来，切换歌曲后生效。">动态波形图</div>
                    <label class="settingOption">
                        <input type="checkbox" id="animatedWaveform">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText" title="仅播放歌曲的副歌部分，然后切换到下一首。注意：此功能仅对部分歌曲有效。">
                        仅副歌模式</div>
                    <label class="settingOption">
                        <input type="checkbox" id="chorusMode">
                        <span class="slider"></span>
                    </label>
                </li>
            </ul>
        </div>

        <!-- 播放列表 -->
        <div class="pure-menu pure-menu-scrollable" id="playlist">
            <i class="far fa-times-circle fa-3x" id="closePlaylist"></i>
        </div>

        <!-- 音量控制 -->
        <div id="volume" class="fadeout">
            <div id="barFull" class="bar"></div>
            <div id="barEmpty" class="bar"></div>
            <div id="sliderBtn"></div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.15/howler.core.min.js"></script>
    <script>
        // 模拟音乐数据
        const mockMusicData = [
            {
                title: "U.N.オーエンは彼女なのか？",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                series: "东方红魔乡"
            },
            {
                title: "亡き王女の為のセプテット",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                series: "东方红魔乡"
            },
            {
                title: "少女綺想曲 ～ Dream Battle",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                series: "东方永夜抄"
            },
            {
                title: "信仰は儚き人間の為に",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                series: "东方风神录"
            }
        ];

        // Cache references to DOM elements
        const elements = {
            track: document.getElementById('track'),
            timer: document.getElementById('timer'),
            duration: document.getElementById('duration'),
            playBtn: document.getElementById('playBtn'),
            pauseBtn: document.getElementById('pauseBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            playlistBtn: document.getElementById('playlistBtn'),
            volumeBtn: document.getElementById('volumeBtn'),
            progress: document.getElementById('progress'),
            waveform: document.getElementById('waveform'),
            loading: document.getElementById('loading'),
            playlist: document.getElementById('playlist'),
            volume: document.getElementById('volume'),
            barEmpty: document.getElementById('barEmpty'),
            barFull: document.getElementById('barFull'),
            sliderBtn: document.getElementById('sliderBtn'),
            setting: document.getElementById('setting'),
            closePlaylist: document.getElementById('closePlaylist'),
            series: document.getElementById('series')
        };

        class MusicPlayer {
            constructor(playlist) {
                this.playlist = playlist;
                this.currentIndex = 0;
                this.isPlaying = false;
                this.volume = 0.7;
                this.howl = null;
                
                this.init();
            }

            init() {
                this.createPlaylist();
                this.bindEvents();
                this.loadSong(this.currentIndex);
                this.updateVolume(this.volume);
            }

            createPlaylist() {
                elements.playlist.innerHTML = '';
                const ul = document.createElement('ul');
                ul.className = 'pure-menu-list';
                
                this.playlist.forEach((song, index) => {
                    const li = document.createElement('li');
                    li.className = 'pure-menu-item';
                    
                    const a = document.createElement('div');
                    a.className = 'pure-menu-link';
                    a.innerHTML = song.title;
                    a.style.cursor = 'pointer';
                    a.style.padding = '10px';
                    a.style.color = '#fff';
                    
                    a.addEventListener('click', () => {
                        this.loadSong(index);
                        this.play();
                    });
                    
                    li.appendChild(a);
                    ul.appendChild(li);
                });
                
                elements.playlist.appendChild(ul);
            }

            bindEvents() {
                // 播放控制
                elements.playBtn.addEventListener('click', () => this.play());
                elements.pauseBtn.addEventListener('click', () => this.pause());
                elements.prevBtn.addEventListener('click', () => this.previous());
                elements.nextBtn.addEventListener('click', () => this.next());

                // 界面控制
                elements.playlistBtn.addEventListener('click', () => this.togglePlaylist());
                elements.settingBtn.addEventListener('click', () => this.toggleSetting());
                elements.volumeBtn.addEventListener('click', () => this.toggleVolume());
                elements.closePlaylist.addEventListener('click', () => this.togglePlaylist());

                // 进度条点击
                elements.waveform.addEventListener('click', (e) => {
                    if (this.howl) {
                        const rect = elements.waveform.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        this.howl.seek(this.howl.duration() * percent);
                    }
                });
            }

            loadSong(index) {
                this.currentIndex = index;
                const song = this.playlist[index];

                // 更新UI
                elements.track.textContent = song.title;
                elements.series.textContent = song.series;

                // 停止当前播放
                if (this.howl) {
                    this.howl.stop();
                }

                // 创建新的Howl实例
                this.howl = new Howl({
                    src: [song.file],
                    html5: true,
                    volume: this.volume,
                    onplay: () => {
                        this.isPlaying = true;
                        elements.playBtn.style.display = 'none';
                        elements.pauseBtn.style.display = 'block';
                        this.updateProgress();
                    },
                    onpause: () => {
                        this.isPlaying = false;
                        elements.playBtn.style.display = 'block';
                        elements.pauseBtn.style.display = 'none';
                    },
                    onend: () => {
                        this.next();
                    },
                    onload: () => {
                        elements.loading.style.display = 'none';
                        const duration = this.howl.duration();
                        elements.duration.textContent = this.formatTime(duration);
                    },
                    onloaderror: () => {
                        console.error('加载音频失败');
                        elements.loading.style.display = 'none';
                    }
                });

                elements.loading.style.display = 'block';
            }

            play() {
                if (!this.howl) return;

                if (this.howl.playing()) {
                    this.pause();
                } else {
                    this.howl.play();
                }
            }

            pause() {
                if (this.howl) {
                    this.howl.pause();
                }
            }

            next() {
                const newIndex = (this.currentIndex + 1) % this.playlist.length;
                this.loadSong(newIndex);
                if (this.isPlaying) {
                    this.play();
                }
            }

            previous() {
                const newIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length;
                this.loadSong(newIndex);
                if (this.isPlaying) {
                    this.play();
                }
            }

            updateProgress() {
                if (this.howl && this.howl.playing()) {
                    const seek = this.howl.seek();
                    const duration = this.howl.duration();
                    
                    elements.timer.textContent = this.formatTime(seek);
                    elements.progress.style.width = `${(seek / duration) * 100}%`;
                    
                    requestAnimationFrame(() => this.updateProgress());
                }
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            updateVolume(volume) {
                this.volume = volume;
                if (this.howl) {
                    this.howl.volume(volume);
                }
                
                // 更新UI
                const volumePercent = volume * 100;
                elements.barFull.style.height = `${volumePercent}%`;
                elements.sliderBtn.style.bottom = `${volumePercent}%`;
            }

            togglePlaylist() {
                if (elements.playlist.classList.contains('active')) {
                    elements.playlist.classList.remove('active');
                } else {
                    elements.playlist.classList.add('active');
                }
            }

            toggleSetting() {
                if (elements.setting.classList.contains('active')) {
                    elements.setting.classList.remove('active');
                } else {
                    elements.setting.classList.add('active');
                }
            }

            toggleVolume() {
                if (elements.volume.classList.contains('fadeout')) {
                    elements.volume.classList.remove('fadeout');
                    elements.volume.classList.add('fadein');
                } else {
                    elements.volume.classList.remove('fadein');
                    elements.volume.classList.add('fadeout');
                }
            }
        }

        // 初始化播放器
        document.addEventListener('DOMContentLoaded', () => {
            window.musicPlayer = new MusicPlayer(mockMusicData);
        });
    </script>
</body>
</html>
