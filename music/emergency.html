<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="东方Project 随机音乐">
    <meta property="og:type" content="website" />
    <meta property="og:description" content="东方Project 随机音乐">
    <meta name="msvalidate.01" content="3BDCFECA73036E90C8F629F8CC7075D7" />
    <title>东方随机音乐</title>
    <link rel="stylesheet" href="https://unpkg.com/purecss@1.0.0/build/pure-min.css" integrity="sha384-nn4HPE8lTHyVtfCBi5yW9d20FjT8BJwUXyWZT9InLYax14RDjBj46LmSztkmNP9w"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.4.3/plyr.css" integrity="sha256-rufXFXaVZSvt3zXMGOG17EoglendvXvURMiR5lX9O8g="
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://dxwwwqc.github.io/music-assets/styles/styles.css">
    <style>
        .import-section {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .import-input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .import-btn {
            background: #5a67d8;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .import-btn:hover {
            background: #4c51bf;
        }
    </style>
</head>

<body id="body">
    <div id="wrapper">
        <!-- 顶部信息 -->
        <div class="top">
            <div id="title">
                <span id="track"></span>
                <div id="timer">0:00</div>
                <div id="duration">0:00</div>
            </div>
            <div class="subtitle">
                <span id="series"></span>
                <p id="pid"></p>
            </div>
        </div>
        
        <!-- 背景区域 -->
        <div id="background">
            <!-- 视频 -->
            <div class="plyr__video-embed fadein-2s" id="videoPlayer">
                <iframe src=""></iframe>
            </div>
        </div>

        
        <!-- 进度条 -->
        <div id="waveform">
            <canvas id="canvas"></canvas>
        </div>
        <div id="progress"></div>

<!-- 控制区 -->
<div class="controlsOuter">
    <div class="controlsInner">
        <div id="loading"></div>
        <i class="btn fas fa-play" id="playBtn"></i>
        <i class="btn fas fa-pause" id="pauseBtn"></i>
        <i class="btn fas fa-step-backward" id="prevBtn"></i>
        <i class="btn fas fa-step-forward" id="nextBtn"></i>
    </div>
   
    <div class="btn" id="playlistBtn"></div>
    <i class="btn fas fa-cog" id="settingBtn"></i>
    <div class="btn" id="volumeBtn"></div>
    <i class="btn fas fa-file-import" id="importBtn" title="导入外部资源"></i>
</div>

        <!-- 设置面板 -->
        <div class="pure-menu" id="setting">
            <ul class="pure-menu-list">
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">MV生成设置</div>
                </li>
                <li class="pure-menu-item">
                    <label class="settingText" for="numOfImages">图片数量</label>
                    <select class="settingOption select" id="numOfImages">
                        <option>2</option>
                        <option>3</option>
                        <option selected>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </li>
                <li class="pure-menu-item">
                    <label class="settingText" for="imagesDuration">图片显示时长(秒)</label>
                    <select class="settingOption select" id="imagesDuration">
                        <option>3</option>
                        <option>4</option>
                        <option selected>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">音频设置</div>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText">随机播放</div>
                    <label class="settingOption">
                        <input type="checkbox" id="randomPlay">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText" title="使波形图动起来，切换歌曲后生效。">动态波形图</div>
                    <label class="settingOption">
                        <input type="checkbox" id="animatedWaveform">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText" title="仅播放歌曲的副歌部分，然后切换到下一首。注意：此功能仅对部分歌曲有效。">
                        仅副歌模式</div>
                    <label class="settingOption">
                        <input type="checkbox" id="chorusMode">
                        <span class="slider"></span>
                    </label>
                </li>
            </ul>
        </div>

        <!-- 导入面板 -->
        <div class="pure-menu" id="importPanel" style="display: none;">
            <ul class="pure-menu-list">
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">导入外部资源</div>
                </li>
                <li class="pure-menu-item import-section">
                    <div class="settingText">导入音乐</div>
                    <input type="text" class="import-input" id="musicUrl" placeholder="输入音乐文件URL (MP3, WAV, OGG)">
                    <input type="text" class="import-input" id="musicTitle" placeholder="音乐标题">
                    <button class="import-btn" onclick="importMusic()">导入音乐</button>
                </li>
                <li class="pure-menu-item import-section">
                    <div class="settingText">导入图片</div>
                    <input type="text" class="import-input" id="imageUrl" placeholder="输入图片URL (JPG, PNG, GIF)">
                    <button class="import-btn" onclick="importImage()">导入图片</button>
                </li>
                <li class="pure-menu-item import-section">
                    <div class="settingText">导入视频</div>
                    <input type="text" class="import-input" id="videoUrl" placeholder="输入视频URL (MP4, WebM) 或 YouTube链接">
                    <button class="import-btn" onclick="importVideo()">导入视频</button>
                </li>
                <li class="pure-menu-item import-section">
                    <div class="settingText">批量导入</div>
                    <input type="file" class="import-input" id="batchImport" accept=".json" multiple>
                    <button class="import-btn" onclick="batchImport()">批量导入JSON</button>
                </li>
            </ul>
        </div>

        <!-- 播放列表 -->
        <div class="pure-menu pure-menu-scrollable" id="playlist">
            <i class="far fa-times-circle fa-3x" id="closePlaylist"></i>
        </div>

        <!-- 音量控制 -->
        <div id="volume" class="fadeout">
            <div id="barFull" class="bar"></div>
            <div id="barEmpty" class="bar"></div>
            <div id="sliderBtn"></div>
        </div>
    </div>
    <!-- 脚本 -->
    <script src="https://www.gstatic.com/firebasejs/5.4.1/firebase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.15/howler.core.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.4.3/plyr.min.js" integrity="sha256-LAq55x/UUQNWhiFLlHHGGivmJx4sVm70ls05hcmhLQ8="
        crossorigin="anonymous" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/2.0.6/wavesurfer.min.js" defer></script>
    <script src="https://apis.google.com/js/client.js?onload=googleApiClientReady" defer></script>
    <script src="https://dxwwwqc.github.io/music-assets/scripts/vudio.js" defer></script>
    <script src="https://dxwwwqc.github.io/music-assets/scripts/utility.js" defer></script>
    <script src="https://dxwwwqc.github.io/music-assets/scripts/player.js" defer></script>
    <script src="https://dxwwwqc.github.io/music-assets/scripts/video.js" defer></script>
    <script src="https://dxwwwqc.github.io/music-assets/scripts/i18n.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XZWCFGHDLB"></script>
    <script defer>
        // 初始化Firebase
        var config = {
            apiKey: "AIzaSyDmPHweR82MHPChLXyOqrwOaLe8L8FyYGA",
            authDomain: "th-music-video-generator.firebaseapp.com",
            databaseURL: "https://th-music-video-generator.firebaseio.com",
            projectId: "th-music-video-generator",
            storageBucket: "th-music-video-generator.appspot.com",
            messagingSenderId: "766682158017"
        };
        firebase.initializeApp(config);

        // 全局站点标签(gtag.js) - Google Analytics
        window.dataLayer = window.dataLayer || [];
        function gtag() {dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XZWCFGHDLB');

        // 导入功能
        function importMusic() {
            const url = document.getElementById('musicUrl').value;
            const title = document.getElementById('musicTitle').value || '导入的音乐';
            
            if (!url) {
                alert('请输入音乐文件URL');
                return;
            }

            const newSong = {
                title: title,
                file: url,
                howl: null,
                info: { type: 'external' }
            };

            // 添加到播放列表
            if (window.player && window.player.playlist) {
                window.player.playlist.push(newSong);
                updatePlaylistDisplay();
                alert('音乐导入成功！');
            }
        }

        function importImage() {
            const url = document.getElementById('imageUrl').value;
            
            if (!url) {
                alert('请输入图片URL');
                return;
            }

            // 设置背景图片
            document.getElementById('background').style.backgroundImage = `url('${url}')`;
            alert('图片导入成功！');
        }

        function importVideo() {
            const url = document.getElementById('videoUrl').value;
            
            if (!url) {
                alert('请输入视频URL');
                return;
            }

            // 设置视频源
            const videoIframe = document.querySelector('#videoPlayer iframe');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                // YouTube视频
                const videoId = getYouTubeId(url);
                if (videoId) {
                    videoIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&showinfo=0`;
                }
            } else {
                // 直接视频文件
                document.getElementById('background').innerHTML = `
                    <video autoplay muted loop id="externalVideo" style="width:100%;height:100%;object-fit:cover;">
                        <source src="${url}" type="video/mp4">
                    </video>
                `;
            }
            alert('视频导入成功！');
        }

        function batchImport() {
            const fileInput = document.getElementById('batchImport');
            const files = fileInput.files;
            
            if (files.length === 0) {
                alert('请选择JSON文件');
                return;
            }

            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        processBatchData(data);
                    } catch (error) {
                        console.error('JSON解析错误:', error);
                        alert(`文件 ${file.name} 解析失败`);
                    }
                };
                reader.readAsText(file);
            }
        }

        function processBatchData(data) {
            if (data.music && Array.isArray(data.music)) {
                data.music.forEach(song => {
                    if (song.url && song.title) {
                        const newSong = {
                            title: song.title,
                            file: song.url,
                            howl: null,
                            info: { type: 'external' }
                        };
                        if (window.player && window.player.playlist) {
                            window.player.playlist.push(newSong);
                        }
                    }
                });
            }
            
            if (data.images && Array.isArray(data.images)) {
                // 处理图片数据
                console.log('导入图片数据:', data.images);
            }
            
            if (data.videos && Array.isArray(data.videos)) {
                // 处理视频数据
                console.log('导入视频数据:', data.videos);
            }

            updatePlaylistDisplay();
            alert('批量导入完成！');
        }

        function getYouTubeId(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length === 11) ? match[7] : false;
        }

        function updatePlaylistDisplay() {
            // 更新播放列表显示
            if (window.player && window.player.playlist) {
                const pl = document.getElementById('playlist');
                pl.innerHTML = '<i class="far fa-times-circle fa-3x" id="closePlaylist"></i>';
                
                let ul = null;
                let ulth = 1;
                
                window.player.playlist.forEach(function (song) {
                    var li = document.createElement('li');
                    li.className = 'pure-menu-item';
                    
                    if (song.file == null) {
                        if (ul != null) {
                            pl.appendChild(ul);
                        }
                        li.innerHTML = song.title;
                        li.className += ' pure-menu-disabled playlist-title';
                        ul = document.createElement('ul');
                        ul.className = 'pure-menu-list';
                        ulth++;
                    } else {
                        var a = document.createElement('div');
                        a.innerHTML = song.title;
                        a.className = 'pure-menu-link playlist-item';
                        a.onclick = function () {
                            window.player.skipTo(window.player.playlist.indexOf(song));
                        };
                        li.appendChild(a);
                    }
                    if (ul) ul.appendChild(li);
                });
                if (ul) pl.appendChild(ul);
            }
        }

        // 切换导入面板
        document.getElementById('importBtn').addEventListener('click', function() {
            const importPanel = document.getElementById('importPanel');
            const display = importPanel.style.display === 'block' ? 'none' : 'block';
            
            setTimeout(function () {
                importPanel.style.display = display;
            }, display === 'block' ? 0 : 500);
            importPanel.className = display === 'block' ? 'pure-menu fadein' : 'pure-menu fadeout';
        });
    </script>
</body>

</html>
