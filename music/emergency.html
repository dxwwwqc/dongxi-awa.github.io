<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方音乐播放器 - 工作版本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }
        .player-section {
            margin: 20px 0;
        }
        .audio-player {
            width: 100%;
            margin: 10px 0;
        }
        .music-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
        }
        .music-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .music-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .music-item.playing {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            border-left: 4px solid #4CAF50;
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            background: rgba(255, 193, 7, 0.2);
            border-left: 4px solid #ffc107;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn:active {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 东方Project音乐播放器</h1>
        
        <div class="status" id="status">
            正在初始化播放器...
        </div>

        <div class="player-section">
            <audio id="audioPlayer" class="audio-player" controls>
                您的浏览器不支持音频播放。
            </audio>
            
            <div class="controls">
                <button class="btn" onclick="playCurrent()">播放</button>
                <button class="btn" onclick="pauseCurrent()">暂停</button>
                <button class="btn" onclick="playPrevious()">上一首</button>
                <button class="btn" onclick="playNext()">下一首</button>
                <button class="btn" onclick="testAllUrls()">测试所有链接</button>
            </div>
        </div>

        <div class="music-list" id="musicList">
            <div class="music-item">加载音乐列表中...</div>
        </div>
    </div>

    <script>
        // 音乐列表 - 使用多种可能的URL格式
        const musicList = [
            {
                name: '禁断の扉の向こうは、この世かあの世か',
                urls: [
                    'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3',
                    'https://dxwwwqc.github.io/music-assets/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3',
                    'https://github.com/dxwwwqc/music-assets/raw/main/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3'
                ]
            },
            {
                name: '少女幻葬 ~ Necro-Fantasy',
                urls: [
                    'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th07/16.%20少女幻葬%20～%20Necro-Fantasy.mp3',
                    'https://dxwwwqc.github.io/music-assets/audio/th07/16.%20少女幻葬%20～%20Necro-Fantasy.mp3'
                ]
            },
            {
                name: 'もうドアには入れない',
                urls: [
                    'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th16/14.%20もうドアには入れない.mp3',
                    'https://dxwwwqc.github.io/music-assets/audio/th16/14.%20もうドアには入れない.mp3'
                ]
            }
        ];

        let currentTrackIndex = 0;
        let currentUrlIndex = 0;
        const audioPlayer = document.getElementById('audioPlayer');
        const statusElement = document.getElementById('status');

        // 更新状态显示
        function updateStatus(message, isError = false) {
            statusElement.textContent = message;
            statusElement.style.background = isError ? 
                'rgba(244, 67, 54, 0.2)' : 'rgba(76, 175, 80, 0.2)';
            statusElement.style.borderLeftColor = isError ? '#f44336' : '#4CAF50';
            console.log(message);
        }

        // 测试URL是否可访问
        async function testUrl(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (error) {
                return false;
            }
        }

        // 测试所有URL
        async function testAllUrls() {
            updateStatus('正在测试所有音乐链接...');
            let workingUrls = [];
            
            for (let track of musicList) {
                for (let url of track.urls) {
                    const isWorking = await testUrl(url);
                    if (isWorking) {
                        workingUrls.push(`${track.name}: ${url}`);
                        break;
                    }
                }
            }
            
            if (workingUrls.length > 0) {
                updateStatus(`找到 ${workingUrls.length} 个可用的音乐链接`);
                console.log('可用的链接:', workingUrls);
            } else {
                updateStatus('❌ 没有找到可用的音乐链接', true);
            }
        }

        // 播放音乐
        async function playMusic(trackIndex, urlIndex = 0) {
            const track = musicList[trackIndex];
            if (!track || urlIndex >= track.urls.length) {
                updateStatus('没有可用的音乐链接', true);
                return;
            }

            const url = track.urls[urlIndex];
            currentTrackIndex = trackIndex;
            currentUrlIndex = urlIndex;

            updateStatus(`尝试播放: ${track.name} (链接 ${urlIndex + 1}/${track.urls.length})`);
            
            try {
                // 设置音频源
                audioPlayer.src = url;
                
                // 尝试播放
                await audioPlayer.play();
                
                updateStatus(`✅ 正在播放: ${track.name}`);
                
                // 更新播放状态
                updatePlaybackState();
                
            } catch (error) {
                console.error(`播放失败 (链接 ${urlIndex + 1}):`, error);
                
                // 尝试下一个URL
                if (urlIndex + 1 < track.urls.length) {
                    updateStatus(`尝试下一个链接...`);
                    setTimeout(() => playMusic(trackIndex, urlIndex + 1), 1000);
                } else {
                    updateStatus(`❌ 所有链接都播放失败: ${track.name}`, true);
                }
            }
        }

        // 更新播放状态显示
        function updatePlaybackState() {
            // 清除所有播放状态
            document.querySelectorAll('.music-item').forEach(item => {
                item.classList.remove('playing');
            });
            
            // 设置当前播放状态
            const items = document.querySelectorAll('.music-item');
            if (items[currentTrackIndex]) {
                items[currentTrackIndex].classList.add('playing');
            }
        }

        // 控制函数
        function playCurrent() {
            if (audioPlayer.src) {
                audioPlayer.play().catch(error => {
                    updateStatus('播放失败: ' + error.message, true);
                });
            }
        }

        function pauseCurrent() {
            audioPlayer.pause();
            updateStatus('已暂停');
        }

        function playPrevious() {
            currentTrackIndex = (currentTrackIndex - 1 + musicList.length) % musicList.length;
            playMusic(currentTrackIndex, 0);
        }

        function playNext() {
            currentTrackIndex = (currentTrackIndex + 1) % musicList.length;
            playMusic(currentTrackIndex, 0);
        }

        // 初始化音乐列表
        function initMusicList() {
            const musicListElement = document.getElementById('musicList');
            musicListElement.innerHTML = '';
            
            musicList.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'music-item';
                item.innerHTML = `
                    <strong>${track.name}</strong>
                    <div style="font-size: 12px; opacity: 0.7; margin-top: 5px;">
                        ${track.urls.length} 个可用链接
                    </div>
                `;
                
                item.addEventListener('click', () => {
                    playMusic(index, 0);
                });
                
                musicListElement.appendChild(item);
            });
        }

        // 音频事件监听
        audioPlayer.addEventListener('ended', () => {
            updateStatus('播放结束');
            playNext();
        });

        audioPlayer.addEventListener('error', (e) => {
            updateStatus('音频播放错误: ' + e.message, true);
        });

        audioPlayer.addEventListener('loadstart', () => {
            updateStatus('开始加载音频...');
        });

        audioPlayer.addEventListener('canplay', () => {
            updateStatus('音频可以播放');
        });

        // 初始化
        function initialize() {
            updateStatus('播放器初始化完成');
            initMusicList();
            testAllUrls();
            
            // 3秒后自动播放第一首
            setTimeout(() => {
                playMusic(0, 0);
            }, 3000);
        }

        // 启动
        initialize();
    </script>
</body>
</html>
