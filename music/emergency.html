<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方随机音乐</title>
    <link rel="stylesheet" href="https://unpkg.com/purecss@1.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.4.3/plyr.css">
    <style>
        :root {
            --primary-color: #5a189a;
            --secondary-color: #9d4edd;
            --accent-color: #e0aaff;
            --text-color: #f8f9fa;
            --bg-color: #10002b;
            --bg-secondary: #240046;
            --border-radius: 8px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 顶部信息区域 */
        .top {
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(16, 0, 43, 0.9), transparent);
            z-index: 10;
            position: relative;
        }

        #title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        #track {
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #timer, #duration {
            font-size: 1rem;
            color: var(--accent-color);
            margin-left: 10px;
        }

        .subtitle {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #ccc;
        }

        /* 背景区域 */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: linear-gradient(45deg, #1a0033, #330066);
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }

        .plyr__video-embed {
            width: 100%;
            height: 100%;
        }

        .plyr__video-embed iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 进度条和波形图 */
        #waveform {
            position: relative;
            height: 80px;
            background: rgba(36, 0, 70, 0.7);
            z-index: 5;
        }

        #canvas {
            width: 100%;
            height: 100%;
        }

        #progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: rgba(157, 78, 221, 0.3);
            z-index: 6;
            pointer-events: none;
            transition: width 0.1s linear;
        }

        /* 控制区域 */
        .controlsOuter {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(16, 0, 43, 0.8);
            z-index: 10;
            position: relative;
        }

        .controlsInner {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            font-size: 1.5rem;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .btn:hover {
            color: var(--accent-color);
            background: rgba(157, 78, 221, 0.2);
        }

        #loading {
            width: 24px;
            height: 24px;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 设置面板 */
        #setting {
            position: absolute;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            z-index: 20;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
        }

        #setting.active {
            right: 0;
        }

        .settingTitle {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 15px 0 10px;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .settingText {
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: block;
        }

        .settingOption {
            margin-bottom: 15px;
        }

        .select {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        /* 播放列表 */
        #playlist {
            position: absolute;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: var(--bg-secondary);
            z-index: 20;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        #playlist.active {
            left: 0;
        }

        #closePlaylist {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
        }

        #closePlaylist:hover {
            color: var(--accent-color);
        }

        .playlist-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .playlist-item:hover {
            background: rgba(157, 78, 221, 0.2);
        }

        .playlist-item.active {
            background: var(--primary-color);
            color: var(--accent-color);
        }

        /* 音量控制 */
        #volume {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 30px;
            height: 150px;
            background: rgba(36, 0, 70, 0.8);
            border-radius: 15px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #volume.active {
            opacity: 1;
            pointer-events: all;
        }

        .bar {
            width: 6px;
            border-radius: 3px;
        }

        #barFull {
            background: var(--accent-color);
            flex: 1;
            margin-bottom: 5px;
        }

        #barEmpty {
            background: rgba(255, 255, 255, 0.2);
            flex: 1;
            margin-top: 5px;
        }

        #sliderBtn {
            width: 20px;
            height: 20px;
            background: var(--text-color);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            left: 5px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #track {
                font-size: 1.2rem;
            }
            
            .btn {
                font-size: 1.3rem;
                width: 36px;
                height: 36px;
            }
            
            #setting, #playlist {
                width: 250px;
            }
        }

        @media (max-width: 480px) {
            .top {
                padding: 10px 15px;
            }
            
            #track {
                font-size: 1rem;
            }
            
            .controlsOuter {
                padding: 10px 15px;
            }
            
            .controlsInner {
                gap: 10px;
            }
            
            .btn {
                font-size: 1.2rem;
                width: 32px;
                height: 32px;
            }
            
            #waveform {
                height: 60px;
            }
        }

        /* 自定义复选框样式 */
        input[type="checkbox"] {
            display: none;
        }

        .slider {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            background-color: #ccc;
            border-radius: 24px;
            transition: var(--transition);
            cursor: pointer;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: var(--transition);
        }

        input[type="checkbox"]:checked + .slider {
            background-color: var(--accent-color);
        }

        input[type="checkbox"]:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <!-- 顶部信息 -->
        <div class="top">
            <div id="title">
                <span id="track">东方随机音乐</span>
                <div id="timer">0:00</div>
                <div id="duration">0:00</div>
            </div>
            <div class="subtitle">
                <span id="series">正在加载...</span>
                <p id="pid"></p>
            </div>
        </div>
        
        <!-- 背景区域 -->
        <div id="background">
            <img class="background-image" id="backgroundImage" src="" alt="背景图片">
        </div>

        <!-- 进度条 -->
        <div id="waveform">
            <canvas id="canvas"></canvas>
        </div>
        <div id="progress"></div>

        <!-- 控制区 -->
        <div class="controlsOuter">
            <div class="controlsInner">
                <div id="loading"></div>
                <i class="btn fas fa-play" id="playBtn"></i>
                <i class="btn fas fa-pause" id="pauseBtn" style="display: none;"></i>
                <i class="btn fas fa-step-backward" id="prevBtn"></i>
                <i class="btn fas fa-step-forward" id="nextBtn"></i>
            </div>
           
            <div class="btn" id="playlistBtn">
                <i class="fas fa-list"></i>
            </div>
            <i class="btn fas fa-cog" id="settingBtn"></i>
            <div class="btn" id="volumeBtn">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="pure-menu" id="setting">
            <ul class="pure-menu-list">
                <li class="pure-menu-item">
                    <div class="settingText settingTitle">音频设置</div>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText">随机播放</div>
                    <label class="settingOption">
                        <input type="checkbox" id="randomPlay">
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText">循环播放</div>
                    <label class="settingOption">
                        <input type="checkbox" id="loopPlay" checked>
                        <span class="slider"></span>
                    </label>
                </li>
                <li class="pure-menu-item">
                    <div class="settingText">自动播放下一首</div>
                    <label class="settingOption">
                        <input type="checkbox" id="autoPlay" checked>
                        <span class="slider"></span>
                    </label>
                </li>
            </ul>
        </div>

        <!-- 播放列表 -->
        <div class="pure-menu pure-menu-scrollable" id="playlist">
            <i class="far fa-times-circle" id="closePlaylist"></i>
            <h3 style="margin: 20px 0 10px; color: var(--accent-color);">播放列表</h3>
            <div id="playlistItems"></div>
        </div>

        <!-- 音量控制 -->
        <div id="volume">
            <div id="barFull" class="bar"></div>
            <div id="barEmpty" class="bar"></div>
            <div id="sliderBtn"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.15/howler.core.min.js"></script>
    <script>
        // 模拟音乐数据 - 使用公开可访问的音乐文件
        const mockMusicData = [
            {
                title: "U.N.オーエンは彼女なのか？",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                series: "东方红魔乡",
                image: "https://picsum.photos/800/600?random=1"
            },
            {
                title: "亡き王女の為のセプテット",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                series: "东方红魔乡",
                image: "https://picsum.photos/800/600?random=2"
            },
            {
                title: "少女綺想曲 ～ Dream Battle",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                series: "东方永夜抄",
                image: "https://picsum.photos/800/600?random=3"
            },
            {
                title: "信仰は儚き人間の為に",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                series: "东方风神录",
                image: "https://picsum.photos/800/600?random=4"
            },
            {
                title: "幽雅に咲かせ、墨染の桜",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                series: "东方妖妖梦",
                image: "https://picsum.photos/800/600?random=5"
            },
            {
                title: "Bad Apple!!",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                series: "东方幻想乡",
                image: "https://picsum.photos/800/600?random=6"
            },
            {
                title: "千年幻想郷",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3",
                series: "东方永夜抄",
                image: "https://picsum.photos/800/600?random=7"
            },
            {
                title: "ネクロファンタジア",
                file: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
                series: "东方妖妖梦",
                image: "https://picsum.photos/800/600?random=8"
            }
        ];

        // Cache references to DOM elements
        const elements = {
            track: document.getElementById('track'),
            timer: document.getElementById('timer'),
            duration: document.getElementById('duration'),
            playBtn: document.getElementById('playBtn'),
            pauseBtn: document.getElementById('pauseBtn'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            settingBtn: document.getElementById('settingBtn'),
            playlistBtn: document.getElementById('playlistBtn'),
            volumeBtn: document.getElementById('volumeBtn'),
            progress: document.getElementById('progress'),
            waveform: document.getElementById('waveform'),
            canvas: document.getElementById('canvas'),
            loading: document.getElementById('loading'),
            playlist: document.getElementById('playlist'),
            playlistItems: document.getElementById('playlistItems'),
            volume: document.getElementById('volume'),
            barEmpty: document.getElementById('barEmpty'),
            barFull: document.getElementById('barFull'),
            sliderBtn: document.getElementById('sliderBtn'),
            setting: document.getElementById('setting'),
            closePlaylist: document.getElementById('closePlaylist'),
            backgroundImage: document.getElementById('backgroundImage'),
            series: document.getElementById('series')
        };

        class MusicPlayer {
            constructor(playlist) {
                this.playlist = playlist;
                this.currentIndex = 0;
                this.isPlaying = false;
                this.volume = 0.7;
                this.howl = null;
                this.randomPlay = false;
                
                this.init();
            }

            init() {
                this.createPlaylist();
                this.bindEvents();
                this.loadSong(this.currentIndex);
                this.updateVolume(this.volume);
            }

            createPlaylist() {
                elements.playlistItems.innerHTML = '';
                this.playlist.forEach((song, index) => {
                    const item = document.createElement('div');
                    item.className = 'playlist-item';
                    if (index === this.currentIndex) {
                        item.classList.add('active');
                    }
                    item.innerHTML = `
                        <div style="font-weight: bold;">${song.title}</div>
                        <div style="font-size: 0.8em; color: #ccc;">${song.series}</div>
                    `;
                    item.addEventListener('click', () => {
                        this.loadSong(index);
                        this.play();
                    });
                    elements.playlistItems.appendChild(item);
                });
            }

            bindEvents() {
                // 播放控制
                elements.playBtn.addEventListener('click', () => this.play());
                elements.pauseBtn.addEventListener('click', () => this.pause());
                elements.prevBtn.addEventListener('click', () => this.previous());
                elements.nextBtn.addEventListener('click', () => this.next());

                // 界面控制
                elements.playlistBtn.addEventListener('click', () => this.togglePlaylist());
                elements.settingBtn.addEventListener('click', () => this.toggleSetting());
                elements.volumeBtn.addEventListener('click', () => this.toggleVolume());
                elements.closePlaylist.addEventListener('click', () => this.togglePlaylist());

                // 设置项
                document.getElementById('randomPlay').addEventListener('change', (e) => {
                    this.randomPlay = e.target.checked;
                });

                // 音量控制
                this.setupVolumeControl();

                // 进度条点击
                elements.waveform.addEventListener('click', (e) => {
                    if (this.howl) {
                        const rect = elements.waveform.getBoundingClientRect();
                        const percent = (e.clientX - rect.left) / rect.width;
                        this.howl.seek(this.howl.duration() * percent);
                    }
                });
            }

            setupVolumeControl() {
                let isDragging = false;

                elements.volume.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    this.updateVolumeFromEvent(e);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        this.updateVolumeFromEvent(e);
                    }
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                elements.volumeBtn.addEventListener('click', () => {
                    this.toggleVolume();
                });
            }

            updateVolumeFromEvent(e) {
                const rect = elements.volume.getBoundingClientRect();
                let volume = 1 - (e.clientY - rect.top) / rect.height;
                volume = Math.max(0, Math.min(1, volume));
                this.updateVolume(volume);
            }

            updateVolume(volume) {
                this.volume = volume;
                if (this.howl) {
                    this.howl.volume(volume);
                }
                
                // 更新UI
                const volumePercent = volume * 100;
                elements.barFull.style.height = `${volumePercent}%`;
                elements.sliderBtn.style.bottom = `${volumePercent}%`;
            }

            loadSong(index) {
                this.currentIndex = index;
                const song = this.playlist[index];

                // 更新UI
                elements.track.textContent = song.title;
                elements.series.textContent = song.series;
                elements.backgroundImage.src = song.image;

                // 高亮当前播放的歌曲
                document.querySelectorAll('.playlist-item').forEach((item, i) => {
                    item.classList.toggle('active', i === index);
                });

                // 停止当前播放
                if (this.howl) {
                    this.howl.stop();
                }

                // 创建新的Howl实例
                this.howl = new Howl({
                    src: [song.file],
                    html5: true,
                    volume: this.volume,
                    onplay: () => {
                        this.isPlaying = true;
                        elements.playBtn.style.display = 'none';
                        elements.pauseBtn.style.display = 'block';
                        this.updateProgress();
                    },
                    onpause: () => {
                        this.isPlaying = false;
                        elements.playBtn.style.display = 'block';
                        elements.pauseBtn.style.display = 'none';
                    },
                    onend: () => {
                        if (document.getElementById('autoPlay').checked) {
                            this.next();
                        } else {
                            this.isPlaying = false;
                            elements.playBtn.style.display = 'block';
                            elements.pauseBtn.style.display = 'none';
                        }
                    },
                    onload: () => {
                        elements.loading.style.display = 'none';
                        const duration = this.howl.duration();
                        elements.duration.textContent = this.formatTime(duration);
                    },
                    onloaderror: () => {
                        console.error('加载音频失败');
                        elements.loading.style.display = 'none';
                    }
                });

                elements.loading.style.display = 'block';
            }

            play() {
                if (!this.howl) return;

                if (this.howl.playing()) {
                    this.pause();
                } else {
                    this.howl.play();
                }
            }

            pause() {
                if (this.howl) {
                    this.howl.pause();
                }
            }

            next() {
                let newIndex;
                if (this.randomPlay) {
                    do {
                        newIndex = Math.floor(Math.random() * this.playlist.length);
                    } while (newIndex === this.currentIndex);
                } else {
                    newIndex = (this.currentIndex + 1) % this.playlist.length;
                }
                this.loadSong(newIndex);
                if (this.isPlaying) {
                    this.play();
                }
            }

            previous() {
                let newIndex;
                if (this.randomPlay) {
                    do {
                        newIndex = Math.floor(Math.random() * this.playlist.length);
                    } while (newIndex === this.currentIndex);
                } else {
                    newIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length;
                }
                this.loadSong(newIndex);
                if (this.isPlaying) {
                    this.play();
                }
            }

            updateProgress() {
                if (this.howl && this.howl.playing()) {
                    const seek = this.howl.seek();
                    const duration = this.howl.duration();
                    
                    elements.timer.textContent = this.formatTime(seek);
                    elements.progress.style.width = `${(seek / duration) * 100}%`;
                    
                    requestAnimationFrame(() => this.updateProgress());
                }
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            togglePlaylist() {
                elements.playlist.classList.toggle('active');
            }

            toggleSetting() {
                elements.setting.classList.toggle('active');
            }

            toggleVolume() {
                elements.volume.classList.toggle('active');
            }
        }

        // 初始化播放器
        document.addEventListener('DOMContentLoaded', () => {
            window.musicPlayer = new MusicPlayer(mockMusicData);
        });
    </script>
</body>
</html>
