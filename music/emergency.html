<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>东方音乐播放器 - 紧急版本</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        .player-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .music-list {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .music-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.3s;
        }
        .music-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .music-item.playing {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: rgba(255,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎵 东方Project音乐库 - 紧急版本</h1>
        
        <div class="status" id="status">
            正在检查资源状态...
        </div>
        
        <audio id="audioPlayer" controls style="width: 100%; margin: 20px 0;"></audio>
        
        <div class="music-list" id="musicList">
            <div class="music-item">加载音乐列表中...</div>
        </div>
    </div>

    <script>
        // 测试不同的音乐文件链接
        const MUSIC_URLS = [
            'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3',
            'https://dxwwwqc.github.io/music-assets/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3'
        ];

        // 音乐列表
        const musicList = [
            { 
                name: '禁断の扉の向こうは、この世かあの世か', 
                files: [
                    'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3',
                    'https://dxwwwqc.github.io/music-assets/audio/th16/10.%20禁断の扉の向こうは、この世かあの世か.mp3'
                ]
            },
            { 
                name: '少女幻葬 ~ Necro-Fantasy', 
                files: [
                    'https://raw.githubusercontent.com/dxwwwqc/music-assets/main/audio/th07/16.%20少女幻葬　～%20Necro-Fantasy.mp3',
                    'https://dxwwwqc.github.io/music-assets/audio/th07/16.%20少女幻葬　～%20Necro-Fantasy.mp3'
                ]
            }
        ];

        let currentWorkingUrl = '';

        // 测试音乐文件是否可访问
        async function testMusicUrls() {
            const statusElement = document.getElementById('status');
            
            for (let url of MUSIC_URLS) {
                try {
                    statusElement.innerHTML = `测试链接: ${url}`;
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        currentWorkingUrl = url.split('/audio/')[0] + '/audio/';
                        statusElement.innerHTML = `✅ 找到可用的音乐链接: ${currentWorkingUrl}`;
                        statusElement.style.background = 'rgba(0,255,0,0.1)';
                        return true;
                    }
                } catch (error) {
                    console.log(`链接 ${url} 不可用:`, error);
                }
            }
            
            statusElement.innerHTML = '❌ 所有音乐链接都不可用，请检查音乐仓库设置';
            statusElement.style.background = 'rgba(255,0,0,0.2)';
            return false;
        }

        function initPlayer() {
            const player = document.getElementById('audioPlayer');
            const musicListElement = document.getElementById('musicList');
            
            // 清空加载提示
            musicListElement.innerHTML = '';
            
            // 创建音乐列表
            musicList.forEach((music, index) => {
                const item = document.createElement('div');
                item.className = 'music-item';
                item.innerHTML = `<strong>${music.name}</strong>`;
                
                item.addEventListener('click', async () => {
                    // 移除其他项的播放状态
                    document.querySelectorAll('.music-item').forEach(el => {
                        el.classList.remove('playing');
                    });
                    
                    // 设置当前项为播放状态
                    item.classList.add('playing');
                    
                    // 尝试播放所有可用的文件链接
                    for (let fileUrl of music.files) {
                        try {
                            console.log('尝试播放:', fileUrl);
                            player.src = fileUrl;
                            await player.play();
                            console.log('播放成功:', fileUrl);
                            break; // 如果成功就停止尝试
                        } catch (error) {
                            console.error('播放失败:', fileUrl, error);
                            continue; // 继续尝试下一个链接
                        }
                    }
                });
                
                musicListElement.appendChild(item);
            });
        }

        // 初始化
        async function initialize() {
            const status = await testMusicUrls();
            if (status) {
                initPlayer();
            }
        }

        // 启动
        initialize();
    </script>
</body>
</html>
