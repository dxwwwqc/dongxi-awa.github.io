<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>东方随机音乐</title>
    <!-- 外部资源 -->
    <link rel="stylesheet" href="https://unpkg.com/purecss@1.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.4.3/plyr.css">
</head>
<body id="body">
    <div id="wrapper">
        <!-- 顶部信息 -->
        <div class="top">
            <div id="title">
                <span id="track">加载中...</span>
                <div id="timer">0:00</div>
                <div id="duration">0:00</div>
            </div>
            <div class="subtitle">
                <span id="series"></span>
                <p id="pid"></p>
            </div>
        </div>
        
        <!-- 背景区域 -->
        <div id="background"></div>

        <!-- 视频播放器 -->
        <div class="plyr__video-embed fadein-2s" id="videoPlayer">
            <iframe src=""></iframe>
        </div>

        <!-- 进度条与波形图 -->
        <div id="waveform">
            <canvas id="canvas"></canvas>
        </div>
        <div id="progress"></div>

        <!-- 控制区 -->
        <div class="controlsOuter">
            <div id="loadingText" style="display: block; color: white; text-align: center;">加载中...</div>
            <div class="controlsInner">
                <div id="loading"></div>
                <i class="btn fas fa-play" id="playBtn" style="display: none;"></i>
                <i class="btn fas fa-pause" id="pauseBtn" style="display: none;"></i>
                <i class="btn fas fa-step-backward" id="prevBtn" style="display: none;"></i>
                <i class="btn fas fa-step-forward" id="nextBtn" style="display: none;"></i>
            </div>
            <div class="btn" id="playlistBtn" style="display: none;"></div>
            <i class="btn fas fa-cog" id="settingBtn" style="display: none;"></i>
            <div class="btn" id="volumeBtn" style="display: none;"></div>
        </div>

        <!-- 设置面板、播放列表、音量控制（结构省略，同前） -->
    </div>

    <!-- 全局变量（唯一声明） -->
    <script>
        const googleAPI = "YOUR_GOOGLE_API_KEY"; // 替换为实际密钥
        const MUSIC_BASE_URL = 'https://dxwwwqc.github.io/music-assets/';
    </script>

    <!-- 外部脚本 -->
    <script src="https://www.gstatic.com/firebasejs/5.4.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/5.4.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.0.15/howler.core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/2.0.6/wavesurfer.min.js"></script>
    <script src="https://apis.google.com/js/client.js?onload=googleApiClientReady"></script>

    <!-- Firebase 初始化 -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmPHweR82MHPChLXyOqrwOaLe8L8FyYGA",
            authDomain: "th-music-video-generator.firebaseapp.com",
            databaseURL: "https://th-music-video-generator.firebaseio.com",
            projectId: "th-music-video-generator",
            storageBucket: "th-music-video-generator.appspot.com",
            messagingSenderId: "766682158017"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <!-- 播放器核心脚本 -->
    <script src="./scripts/player.js"></script>
</body>
</html>
